<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>靜靜在夏天 🎤 KTV 點歌系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
  <div>
    <div class="header-title">🎤 靜靜在夏天 <span>KTV 點歌</span></div>
    <div class="header-subtitle">抖音精選歌單 · 想唱就點</div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋歌曲或歌手..." autocomplete="off">
  </div>
  <button class="queue-btn" onclick="toggleQueue()">
    🎵 歌單
    <span class="queue-count" id="queueCount" style="display:none">0</span>
  </button>
</header>

<!-- Mobile Artist Dropdown (手機版) -->
<div class="mobile-artist-dropdown">
  <span class="mobile-artist-dropdown-icon">🎵</span>
  <select id="artistSelect">
    <option value="all">🎵 全部歌手</option>
  </select>
  <span class="mobile-artist-dropdown-arrow">▾</span>
</div>

<!-- Main Layout -->
<div class="main-layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">歌手</div>
    <div class="artist-tab all-tab active" onclick="filterArtist('all')" data-artist="all">
      <div class="avatar">🎵</div>
      <div class="name">全部</div>
    </div>
    <div id="artistTabs"></div>
    <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Queue Panel -->
  <div class="queue-panel" id="queuePanel">
    <div class="queue-header">
      <h3>🎶 點歌清單</h3>
      <p id="queueSummary">尚未點歌</p>
      <div class="queue-actions">
        <button onclick="shuffleQueue()">🔀 隨機排序</button>
        <button class="clear-btn" onclick="clearQueue()">🗑️ 清空</button>
      </div>
    </div>

    <div class="now-playing" id="nowPlayingSection" style="display:none">
      <div class="now-playing-label">
        <span class="playing-dot"></span>
        NOW PLAYING
      </div>
      <div class="now-playing-song" id="nowPlayingSong"></div>
      <div class="now-playing-artist" id="nowPlayingArtist"></div>
    </div>

    <div class="queue-list" id="queueList">
      <div class="queue-empty">
        <div class="empty-icon">🎤</div>
        <div>點選左側歌曲加入點歌清單</div>
      </div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextSong()" disabled>
      ▶ 下一首
    </button>
  </div>

</div>

<!-- Queue backdrop (mobile overlay) -->
<div class="queue-backdrop" id="queueBackdrop" onclick="closeQueue()"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
